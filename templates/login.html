<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — IT Asset Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --primary: #14375C; --accent: #C8963E; }
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #14375C 0%, #1e4f82 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
    }
    .login-logo { height: 50px; margin-bottom: 8px; }
    .login-title { font-size: 22px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
    .login-sub { font-size: 13px; color: #6b7a8d; margin-bottom: 32px; }
    .form-label { font-size: 13px; font-weight: 500; color: #6b7a8d; }
    .form-control {
      border-radius: 10px;
      border: 1.5px solid #e2e8f0;
      font-size: 14px;
      padding: 11px 14px;
    }
    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(20,55,92,0.08);
    }
    .btn-login {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-login:hover { background: #1e4f82; }
    .divider { border-color: #e2e8f0; margin: 24px 0; }
    .security-note {
      font-size: 11px;
      color: #9aa5b4;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
<div class="login-card">
  <div class="text-center">
    <img src="{{ url_for('static', filename='logo.png') }}" class="login-logo" alt="EtonHouse"/>
    <div class="login-title">IT Asset Manager</div>
    <div class="login-sub">EtonHouse International School</div>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert alert-{{ 'danger' if cat == 'danger' else 'warning' }} py-2 px-3 mb-3" style="border-radius:10px; font-size:13px;">
      <i class="bi bi-exclamation-triangle me-1"></i>{{ msg }}
    </div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-control" placeholder="Enter your username" autofocus autocomplete="username" required/>
    </div>
    <div class="mb-4">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" placeholder="Enter your password" autocomplete="current-password" required/>
    </div>
    <button type="submit" class="btn-login">
      <i class="bi bi-shield-lock me-2"></i>Sign In
    </button>
  </form>

  <div class="security-note">
    <i class="bi bi-lock-fill me-1"></i>
    Restricted access — EtonHouse IT Department only
  </div>
</div>
</body>
</html>
